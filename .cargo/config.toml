# Cargo aliases — short names for common commands. Complements the justfile.
[alias]
c    = "check --all-targets"
ck   = "clippy --all-targets --all-features -- -D warnings"
fmt-check = "fmt --all -- --check"
t    = "nextest run"
d    = "doc --no-deps --open"

# Uncomment and add `mold` (Linux) or `lld` (cross-plat) to speed up link times.
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[build]
# Prefer incremental builds locally; CI sets CARGO_INCREMENTAL=0 explicitly.
incremental = true
