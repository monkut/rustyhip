[profile.default]
retries = 0
failure-output = "immediate-final"
status-level = "pass"
final-status-level = "flaky"

[profile.ci]
retries = 2
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }
failure-output = "immediate-final"

[profile.ci.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true
